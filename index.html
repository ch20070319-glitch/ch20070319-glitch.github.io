<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hot chocolate 的个人主页</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 40px 20px; 
            font-family: "Helvetica Neue", Arial, sans-serif;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: -1;
        }
        。profile-card {
            text-align: center;
            padding: 40px;
            max-width: 900px;        
            background-color: rgba(255, 255, 255, 0.75); 
            border-radius: 16px;      
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin: 0 auto; 
        }
        。avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #ccc;
        }
        .sections-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        .section-box {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            flex: 1;
            max-width: 280px;
        }
        .music-player-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.85);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7); 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; 
        }
        .modal-box {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #entry-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
        #entry-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img id="avatar" src="avatar.png" alt="我的头像" class="avatar">
        <h1>我是 hot chocolate</h1>
        <p>这是我的第一个个人网站</p>
        
        <div class="sections-container">
            <div class="section-box">
                <p>欢迎来到我的网站，目前是 NEU 软件学院的大一新生。</p>
            </div>
            <div class="section-box">
                <p>学习过 C，Java 等语言，最近在学 HTML，Python。未来还计划学习 C++ 和 Agent 方面的知识。</p>
            </div>
            <div class="section-box">
                <p>喜欢玩 Roguelike 卡牌类，节奏音乐类以及推理解密类游戏。偶尔会跟朋友一起玩派对类游戏。最近打算尝试玩 Gal。平时也喜欢听音乐，看漫画，轻小说。喜欢喝绿茶。</p>
            </div>
        </div>
    </div>

    <div id="welcome-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>欢迎来到 hot chocolate 的个人网站</h2>
            <p>为了获得最佳体验，建议开启背景音乐 🎵</p>
            <button id="entry-btn">进入网站</button>
        </div>
    </div>

    <div class="music-player-container">
        <audio id="bg-music" src="music.mp3" controls loop></audio>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        const modal = document.getElementById('welcome-modal');
        const btn = document.getElementById('entry-btn');

        if (audio) {
            audio.volume = 0.2;
        }

        if (btn && modal && audio) {
            btn.addEventListener('click', function() {
                audio.play().catch(function(error) {
                    console.log("播放失败:", error);
                });
                modal.style.display = 'none'; 
            });
        }
    </script>
</body>
</html>
